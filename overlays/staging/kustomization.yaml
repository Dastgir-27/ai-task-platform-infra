apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-task-platform-staging

resources:
  - namespace.yaml
  - ../../base

# Staging runs a reduced footprint of the same manifests.
patches:
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
      name: worker
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

images:
  - name: ghcr.io/OWNER/ai-task-backend
    newName: ghcr.io/dastgir-27/ai-task-backend
    newTag: latest
  - name: ghcr.io/OWNER/ai-task-worker
    newName: ghcr.io/dastgir-27/ai-task-worker
    newTag: latest
  - name: ghcr.io/OWNER/ai-task-frontend
    newName: ghcr.io/dastgir-27/ai-task-frontend
    newTag: latest
