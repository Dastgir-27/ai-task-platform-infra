apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-task-platform-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Dastgir-27/ai-task-platform-infra.git
    targetRevision: main
    path: overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-task-platform-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
