apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      imagePullSecrets:
        - name: ghcr-creds
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: ghcr.io/OWNER/ai-task-worker:latest
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # The worker touches /tmp/worker-heartbeat every loop iteration;
          # a stale heartbeat means the process is stuck.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - test $(($(date +%s) - $(stat -c %Y /tmp/worker-heartbeat))) -lt 120
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - test -f /tmp/worker-heartbeat
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
